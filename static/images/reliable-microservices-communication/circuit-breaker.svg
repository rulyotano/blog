<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 480" width="1100" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2d3d"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900"/>
      <stop offset="100%" style="stop-color:#D97400"/>
    </linearGradient>
    <linearGradient id="stateGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ecc71"/>
      <stop offset="100%" style="stop-color:#27ae60"/>
    </linearGradient>
    <linearGradient id="stateRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#c0392b"/>
    </linearGradient>
    <linearGradient id="stateYellow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#d68910"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8ab4d4"/>
    </marker>
    <marker id="arrRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
    <marker id="arrYellow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f39c12"/>
    </marker>
  </defs>

  <rect width="1100" height="480" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1100" height="480" fill="url(#dots)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Circuit Breaker — State Machine</text>
  <line x1="200" y1="52" x2="900" y2="52" stroke="#FF9900" stroke-width="1" opacity="0.4"/>

  <!-- ===== REQUEST FLOW (top strip) ===== -->
  <!-- Service A box -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="140" height="90" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="40" y="80" width="140" height="28" rx="8" fill="url(#awsOrange)"/>
    <rect x="40" y="100" width="140" height="8" fill="url(#awsOrange)"/>
    <circle cx="80" cy="92" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="80" cy="92" r="3" fill="#ffffff" opacity="0.8"/>
    <text x="110" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Service A</text>
    <text x="110" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Caller</text>
  </g>

  <!-- Circuit Breaker component -->
  <g filter="url(#shadow)">
    <rect x="230" y="80" width="160" height="90" rx="8" fill="#1a2438" stroke="#f39c12" stroke-width="2.5"/>
    <!-- breaker symbol -->
    <circle cx="270" cy="110" r="16" fill="none" stroke="#f39c12" stroke-width="2"/>
    <line x1="262" y1="102" x2="278" y2="118" stroke="#f39c12" stroke-width="2.5" stroke-linecap="round"/>
    <text x="310" y="120" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f39c12">Circuit</text>
    <text x="310" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f39c12">Breaker</text>
    <text x="310" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">HTTP Client Wrapper</text>
  </g>

  <!-- Service B -->
  <g filter="url(#shadow)">
    <rect x="450" y="80" width="140" height="90" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="450" y="80" width="140" height="28" rx="8" fill="url(#awsOrange)"/>
    <rect x="450" y="100" width="140" height="8" fill="url(#awsOrange)"/>
    <circle cx="490" cy="92" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="490" cy="92" r="3" fill="#ffffff" opacity="0.8"/>
    <text x="520" y="134" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Service B</text>
    <text x="520" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Dependency</text>
  </g>

  <!-- Arrows in flow -->
  <line x1="182" y1="125" x2="228" y2="125" stroke="#8ab4d4" stroke-width="2" marker-end="url(#arrWhite)"/>
  <line x1="392" y1="125" x2="448" y2="125" stroke="#8ab4d4" stroke-width="2" marker-end="url(#arrWhite)"/>

  <!-- Fast fail path -->
  <path d="M 310 170 L 310 195 L 110 195 L 110 172" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arrRed)"/>
  <text x="210" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e74c3c">OPEN: fail fast, no request sent</text>

  <!-- ===== STATE MACHINE (bottom) ===== -->
  <text x="550" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="600" fill="#8ab4d4">State Transitions</text>

  <!-- CLOSED state -->
  <g filter="url(#shadow)">
    <circle cx="200" cy="340" r="72" fill="#1a3a1a" stroke="url(#stateGreen)" stroke-width="3"/>
    <text x="200" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#2ecc71">CLOSED</text>
    <text x="200" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Normal operation</text>
    <text x="200" y="362" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Requests pass through</text>
    <circle cx="200" cy="340" r="68" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- OPEN state -->
  <g filter="url(#shadow)">
    <circle cx="550" cy="340" r="72" fill="#3a1a1a" stroke="url(#stateRed)" stroke-width="3"/>
    <text x="550" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="800" fill="#e74c3c">OPEN</text>
    <text x="550" y="345" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Tripped! All requests</text>
    <text x="550" y="362" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">fail immediately</text>
    <circle cx="550" cy="340" r="68" fill="none" stroke="#e74c3c" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- HALF-OPEN state -->
  <g filter="url(#shadow)">
    <circle cx="900" cy="340" r="72" fill="#3a2d0a" stroke="url(#stateYellow)" stroke-width="3"/>
    <text x="900" y="320" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="800" fill="#f39c12">HALF-OPEN</text>
    <text x="900" y="342" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Probe requests</text>
    <text x="900" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">allowed through</text>
    <circle cx="900" cy="340" r="68" fill="none" stroke="#f39c12" stroke-width="1" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- Transition: CLOSED → OPEN (failure threshold) -->
  <path d="M 265 305 Q 380 240 480 305" stroke="#e74c3c" stroke-width="2.5" fill="none" marker-end="url(#arrRed)"/>
  <text x="375" y="255" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#e74c3c">failure threshold exceeded</text>

  <!-- Transition: OPEN → HALF-OPEN (timeout) -->
  <path d="M 622 310 Q 750 240 828 308" stroke="#f39c12" stroke-width="2.5" fill="none" marker-end="url(#arrYellow)"/>
  <text x="728" y="258" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#f39c12">timeout elapsed</text>

  <!-- Transition: HALF-OPEN → CLOSED (success) -->
  <path d="M 842 385 Q 550 460 258 385" stroke="#2ecc71" stroke-width="2.5" fill="none" marker-end="url(#arrGreen)"/>
  <text x="550" y="458" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#2ecc71">probe succeeds → reset</text>

  <!-- Transition: HALF-OPEN → OPEN (still failing) -->
  <path d="M 842 315 Q 750 270 622 315" stroke="#e74c3c" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arrRed)"/>
  <text x="730" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#e74c3c">still failing</text>

  <!-- Retry note box -->
  <rect x="660" y="80" width="200" height="105" rx="8" fill="#0d2137" stroke="#8ab4d4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="760" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#8ab4d4">Retry Strategy</text>
  <text x="760" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">1st retry: 1s</text>
  <text x="760" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">2nd retry: 2s</text>
  <text x="760" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">3rd retry: 3s</text>
  <text x="760" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">(Fibonacci backoff)</text>

  <!-- Note about Polly / Resilience -->
  <rect x="880" y="80" width="185" height="105" rx="8" fill="#0d2137" stroke="#FF9900" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="972" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#FF9900">Libraries</text>
  <text x="972" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">.NET: Polly</text>
  <text x="972" y="138" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">Go: gobreaker</text>
  <text x="972" y="154" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">Java: Resilience4j</text>
  <text x="972" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#ffffff">Node: cockatiel</text>
</svg>
