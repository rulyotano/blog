<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2d3d"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900"/>
      <stop offset="100%" style="stop-color:#D97400"/>
    </linearGradient>
    <linearGradient id="awsPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4F8B"/>
      <stop offset="100%" style="stop-color:#CC3369"/>
    </linearGradient>
    <linearGradient id="awsBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#527FFF"/>
      <stop offset="100%" style="stop-color:#3456CC"/>
    </linearGradient>
    <linearGradient id="awsGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3F8624"/>
      <stop offset="100%" style="stop-color:#2A5C18"/>
    </linearGradient>
    <linearGradient id="awsPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8C4FFF"/>
      <stop offset="100%" style="stop-color:#6B2FCC"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3F8624"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#527FFF"/>
    </marker>
    <marker id="arrPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4F8B"/>
    </marker>
    <marker id="arrPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C4FFF"/>
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Example: Process Payment Received</text>
  <line x1="150" y1="50" x2="1050" y2="50" stroke="#FF9900" stroke-width="1" opacity="0.4"/>

  <!-- Step labels (top) -->
  <text x="600" y="72" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8ab4d4">Combining idempotency + outbox pattern + async queues + circuit breaker in a real scenario</text>

  <!-- ===== ROW 1: Ingestion ===== -->
  <!-- Bank -->
  <g filter="url(#shadow)">
    <rect x="30" y="110" width="120" height="85" rx="8" fill="#1e2f3d" stroke="#8ab4d4" stroke-width="1.5"/>
    <rect x="30" y="110" width="120" height="24" rx="8" fill="#3a4f6a"/>
    <rect x="30" y="126" width="120" height="8" fill="#3a4f6a"/>
    <text x="65" y="122" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">🏦</text>
    <text x="90" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Bank</text>
    <text x="90" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">POST /webhook</text>
    <text x="90" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">payment_id: abc123</text>
  </g>

  <!-- Arrow: Bank → API GW -->
  <line x1="152" y1="152" x2="196" y2="152" stroke="#FF4F8B" stroke-width="2.5" marker-end="url(#arrPink)"/>
  <text x="174" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#FF4F8B">HTTPS</text>

  <!-- API Gateway -->
  <g filter="url(#shadow)">
    <rect x="198" y="110" width="130" height="85" rx="8" fill="#1e2f3d" stroke="#FF4F8B" stroke-width="2"/>
    <rect x="198" y="110" width="130" height="24" rx="8" fill="url(#awsPink)"/>
    <rect x="198" y="126" width="130" height="8" fill="url(#awsPink)"/>
    <text x="230" y="122" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#ffffff">API</text>
    <text x="263" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">API Gateway</text>
    <text x="263" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">AWS API Gateway</text>
    <text x="263" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">auth + rate limit</text>
  </g>

  <!-- Arrow: API GW → Webhook Svc -->
  <line x1="330" y1="152" x2="376" y2="152" stroke="#FF9900" stroke-width="2.5" marker-end="url(#arrOrange)"/>

  <!-- Webhook Service -->
  <g filter="url(#shadow)">
    <rect x="378" y="110" width="140" height="85" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="378" y="110" width="140" height="24" rx="8" fill="url(#awsOrange)"/>
    <rect x="378" y="126" width="140" height="8" fill="url(#awsOrange)"/>
    <circle cx="412" cy="122" r="7" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="412" cy="122" r="2.5" fill="#ffffff" opacity="0.8"/>
    <text x="448" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Webhook Service</text>
    <text x="448" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">validates + publishes</text>
    <text x="448" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">idempotency check</text>
  </g>

  <!-- Arrow: Webhook Svc → SQS -->
  <line x1="520" y1="152" x2="566" y2="152" stroke="#FF4F8B" stroke-width="2.5" marker-end="url(#arrPink)"/>
  <text x="543" y="144" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#FF4F8B">publish</text>

  <!-- SQS: payment-received -->
  <g filter="url(#shadow)">
    <rect x="568" y="110" width="145" height="85" rx="8" fill="#1e2f3d" stroke="#FF4F8B" stroke-width="2"/>
    <rect x="568" y="110" width="145" height="24" rx="8" fill="url(#awsPink)"/>
    <rect x="568" y="126" width="145" height="8" fill="url(#awsPink)"/>
    <rect x="583" y="115" width="22" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
    <rect x="583" y="121" width="22" height="4" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="583" y="127" width="22" height="4" rx="1" fill="#ffffff" opacity="0.5"/>
    <text x="640" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">SQS Queue</text>
    <text x="640" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">payment-received</text>
    <text x="640" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">+ DLQ on failure</text>
  </g>

  <!-- Arrow: SQS → Balance Svc -->
  <line x1="640" y1="197" x2="640" y2="240" stroke="#FF9900" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <text x="666" y="222" font-family="Arial,sans-serif" font-size="9" fill="#FF9900">trigger</text>

  <!-- ===== ROW 2: Processing ===== -->
  <!-- Balance Service -->
  <g filter="url(#shadow)">
    <rect x="530" y="242" width="220" height="100" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2.5"/>
    <rect x="530" y="242" width="220" height="26" rx="8" fill="url(#awsOrange)"/>
    <rect x="530" y="260" width="220" height="8" fill="url(#awsOrange)"/>
    <circle cx="572" cy="255" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="572" cy="255" r="3" fill="#ffffff" opacity="0.8"/>
    <text x="640" y="290" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#ffffff">Balance Service</text>
    <text x="640" y="308" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">ECS / Lambda consumer</text>
    <text x="640" y="325" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">idempotent handler</text>
  </g>

  <!-- Arrow: Balance → DB Transaction -->
  <line x1="640" y1="344" x2="640" y2="388" stroke="#527FFF" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="685" y="370" font-family="Arial,sans-serif" font-size="9" fill="#527FFF">BEGIN TX</text>

  <!-- DB Transaction Box -->
  <rect x="380" y="390" width="520" height="180" rx="10" fill="#0d1e2e" stroke="#527FFF" stroke-width="2.5" stroke-dasharray="8,3"/>
  <text x="640" y="413" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#527FFF">Atomic DB Transaction (RDS PostgreSQL)</text>

  <!-- Balance update cell -->
  <rect x="395" y="422" width="155" height="130" rx="6" fill="#1a3020" stroke="#3F8624" stroke-width="1.5"/>
  <rect x="395" y="422" width="155" height="22" rx="6" fill="url(#awsGreen)"/>
  <rect x="395" y="436" width="155" height="8" fill="url(#awsGreen)"/>
  <text x="472" y="436" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">balance table</text>
  <text x="472" y="458" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">UPDATE balance</text>
  <text x="472" y="473" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">SET amount += 100</text>
  <text x="472" y="488" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">WHERE user_id = X</text>
  <text x="472" y="508" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#3F8624">✓ balance updated</text>
  <text x="472" y="524" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#8ab4d4">(1 row committed)</text>

  <!-- Outbox: compliance -->
  <rect x="562" y="422" width="160" height="130" rx="6" fill="#1e2a3a" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="562" y="422" width="160" height="22" rx="6" fill="url(#awsOrange)"/>
  <rect x="562" y="436" width="160" height="8" fill="url(#awsOrange)"/>
  <text x="642" y="436" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">outbox: compliance</text>
  <text x="642" y="458" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">type: CHECK_PAYMENT</text>
  <text x="642" y="473" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">payload: {payment}</text>
  <text x="642" y="488" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">status: PENDING</text>
  <text x="642" y="508" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#FF9900">⏳ insert outbox row</text>

  <!-- Outbox: notification -->
  <rect x="733" y="422" width="155" height="130" rx="6" fill="#1e2a3a" stroke="#FF9900" stroke-width="1.5"/>
  <rect x="733" y="422" width="155" height="22" rx="6" fill="url(#awsOrange)"/>
  <rect x="733" y="436" width="155" height="8" fill="url(#awsOrange)"/>
  <text x="810" y="436" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">outbox: notification</text>
  <text x="810" y="458" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">type: NOTIFY_USER</text>
  <text x="810" y="473" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">payload: {user, msg}</text>
  <text x="810" y="488" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">status: PENDING</text>
  <text x="810" y="508" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#FF9900">⏳ insert outbox row</text>

  <!-- ===== ROW 3: Outbox Workers ===== -->
  <!-- Worker → RabbitMQ (compliance) -->
  <line x1="642" y1="572" x2="642" y2="610" stroke="#FF9900" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>
  <line x1="810" y1="572" x2="810" y2="610" stroke="#FF9900" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>

  <!-- Worker 1: compliance -->
  <g filter="url(#shadow)">
    <rect x="520" y="612" width="240" height="70" rx="8" fill="#1e2f3d" stroke="#8C4FFF" stroke-width="2"/>
    <rect x="520" y="612" width="240" height="22" rx="8" fill="url(#awsPurple)"/>
    <rect x="520" y="626" width="240" height="8" fill="url(#awsPurple)"/>
    <text x="640" y="648" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Outbox Worker: Compliance</text>
    <text x="640" y="664" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">polls → publishes to RabbitMQ → marks done</text>
  </g>

  <!-- Worker 2: notification -->
  <g filter="url(#shadow)">
    <rect x="688" y="612" width="240" height="70" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="688" y="612" width="240" height="22" rx="8" fill="url(#awsOrange)"/>
    <rect x="688" y="626" width="240" height="8" fill="url(#awsOrange)"/>
    <text x="808" y="648" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Outbox Worker: Notification</text>
    <text x="808" y="664" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">polls → HTTP to notify svc → marks done</text>
  </g>

  <!-- Step number callouts -->
  <circle cx="174" cy="132" r="11" fill="#FF9900"/>
  <text x="174" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">1</text>

  <circle cx="353" cy="132" r="11" fill="#FF9900"/>
  <text x="353" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">2</text>

  <circle cx="543" cy="132" r="11" fill="#FF9900"/>
  <text x="543" y="136" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">3</text>

  <circle cx="640" cy="218" r="11" fill="#FF9900"/>
  <text x="640" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">4</text>

  <circle cx="640" cy="366" r="11" fill="#527FFF"/>
  <text x="640" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#ffffff">5</text>

  <circle cx="642" cy="591" r="11" fill="#FF9900"/>
  <text x="642" y="595" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">6</text>

  <circle cx="810" cy="591" r="11" fill="#FF9900"/>
  <text x="810" y="595" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="800" fill="#000">7</text>

  <!-- Legend (right side) -->
  <rect x="920" y="110" width="250" height="330" rx="8" fill="#0d1e2e" stroke="#4a5568" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="1045" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Flow Summary</text>
  <line x1="930" y1="142" x2="1160" y2="142" stroke="#4a5568" stroke-width="0.5"/>
  <text x="930" y="161" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">①</text>
  <text x="947" y="161" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Bank sends webhook</text>
  <text x="930" y="180" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">②</text>
  <text x="947" y="180" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Webhook svc validates</text>
  <text x="947" y="196" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">+ idempotency check</text>
  <text x="930" y="214" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">③</text>
  <text x="947" y="214" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Publishes to SQS queue</text>
  <text x="930" y="233" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">④</text>
  <text x="947" y="233" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">SQS triggers Balance Svc</text>
  <text x="930" y="252" font-family="Arial,sans-serif" font-size="11" fill="#527FFF">⑤</text>
  <text x="947" y="252" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Atomic TX: update balance</text>
  <text x="947" y="268" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">+ insert 2 outbox rows</text>
  <text x="930" y="286" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">⑥</text>
  <text x="947" y="286" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Worker → RabbitMQ</text>
  <text x="947" y="302" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">→ Compliance Service</text>
  <text x="930" y="320" font-family="Arial,sans-serif" font-size="11" fill="#FF9900">⑦</text>
  <text x="947" y="320" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Worker → HTTP</text>
  <text x="947" y="336" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">→ Notification Service</text>
  <line x1="930" y1="348" x2="1160" y2="348" stroke="#4a5568" stroke-width="0.5"/>
  <text x="1045" y="368" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">Each step: idempotent</text>
  <text x="1045" y="384" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">Failures: DLQ + alerts</text>
  <text x="1045" y="400" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">Outbox errors: alerts</text>
  <text x="1045" y="416" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">on pending records</text>
  <text x="1045" y="432" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">CB on HTTP calls</text>
</svg>
