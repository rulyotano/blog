<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1923"/>
      <stop offset="100%" style="stop-color:#1a2d3d"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9900"/>
      <stop offset="100%" style="stop-color:#D97400"/>
    </linearGradient>
    <linearGradient id="awsPink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4F8B"/>
      <stop offset="100%" style="stop-color:#CC3369"/>
    </linearGradient>
    <linearGradient id="awsBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#527FFF"/>
      <stop offset="100%" style="stop-color:#3456CC"/>
    </linearGradient>
    <linearGradient id="awsGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3F8624"/>
      <stop offset="100%" style="stop-color:#2A5C18"/>
    </linearGradient>
    <linearGradient id="txBox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2f45"/>
      <stop offset="100%" style="stop-color:#0d2035"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <marker id="arrOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/>
    </marker>
    <marker id="arrGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3F8624"/>
    </marker>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#527FFF"/>
    </marker>
    <marker id="arrPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF4F8B"/>
    </marker>
  </defs>

  <rect width="1100" height="520" fill="url(#bg)"/>
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.05"/>
  </pattern>
  <rect width="1100" height="520" fill="url(#dots)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="#ffffff">Outbox Pattern — Atomic Multi-Target Updates</text>
  <line x1="150" y1="52" x2="950" y2="52" stroke="#FF9900" stroke-width="1" opacity="0.4"/>

  <!-- API Gateway -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="130" height="100" rx="8" fill="#1e2f3d" stroke="#FF4F8B" stroke-width="2"/>
    <rect x="40" y="80" width="130" height="28" rx="8" fill="url(#awsPink)"/>
    <rect x="40" y="100" width="130" height="8" fill="url(#awsPink)"/>
    <text x="70" y="93" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">API</text>
    <text x="105" y="148" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">API Gateway</text>
    <text x="105" y="165" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">HTTP Request</text>
  </g>

  <!-- Service A -->
  <g filter="url(#shadow)">
    <rect x="220" y="80" width="140" height="100" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="220" y="80" width="140" height="28" rx="8" fill="url(#awsOrange)"/>
    <rect x="220" y="100" width="140" height="8" fill="url(#awsOrange)"/>
    <circle cx="260" cy="92" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="260" cy="92" r="3" fill="#ffffff" opacity="0.8"/>
    <text x="290" y="145" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Service A</text>
    <text x="290" y="163" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">Business Logic</text>
  </g>

  <!-- Arrow: API → Service A -->
  <line x1="172" y1="130" x2="218" y2="130" stroke="#FF4F8B" stroke-width="2.5" marker-end="url(#arrPink)"/>

  <!-- Arrow: Service A → Transaction -->
  <line x1="362" y1="130" x2="418" y2="130" stroke="#FF9900" stroke-width="2.5" marker-end="url(#arrOrange)"/>
  <text x="390" y="122" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#FF9900">BEGIN TX</text>

  <!-- DB Transaction Box (the key element) -->
  <g filter="url(#shadow)">
    <rect x="420" y="65" width="310" height="245" rx="10" fill="url(#txBox)" stroke="#527FFF" stroke-width="2.5" stroke-dasharray="8,3"/>
    <text x="575" y="88" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#527FFF">Single DB Transaction (ACID)</text>
    <text x="575" y="103" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">All inserts succeed or all rollback</text>

    <!-- Business Table inside TX -->
    <rect x="435" y="115" width="130" height="80" rx="6" fill="#1e3550" stroke="#3F8624" stroke-width="1.5"/>
    <rect x="435" y="115" width="130" height="22" rx="6" fill="url(#awsGreen)"/>
    <rect x="435" y="129" width="130" height="8" fill="url(#awsGreen)"/>
    <!-- table rows -->
    <line x1="438" y1="148" x2="562" y2="148" stroke="#3F8624" stroke-width="0.5" opacity="0.5"/>
    <line x1="438" y1="161" x2="562" y2="161" stroke="#3F8624" stroke-width="0.5" opacity="0.5"/>
    <line x1="438" y1="174" x2="562" y2="174" stroke="#3F8624" stroke-width="0.5" opacity="0.5"/>
    <text x="500" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Business Table</text>
    <text x="500" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">balance: +100</text>
    <text x="500" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">status: updated</text>
    <text x="500" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">✓ committed</text>

    <!-- Outbox Table inside TX -->
    <rect x="580" y="115" width="140" height="80" rx="6" fill="#1e3550" stroke="#FF9900" stroke-width="1.5"/>
    <rect x="580" y="115" width="140" height="22" rx="6" fill="url(#awsOrange)"/>
    <rect x="580" y="129" width="140" height="8" fill="url(#awsOrange)"/>
    <line x1="583" y1="148" x2="717" y2="148" stroke="#FF9900" stroke-width="0.5" opacity="0.5"/>
    <line x1="583" y1="161" x2="717" y2="161" stroke="#FF9900" stroke-width="0.5" opacity="0.5"/>
    <line x1="583" y1="174" x2="717" y2="174" stroke="#FF9900" stroke-width="0.5" opacity="0.5"/>
    <text x="650" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#ffffff">Outbox Table</text>
    <text x="650" y="157" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">event_type: notify</text>
    <text x="650" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">status: pending</text>
    <text x="650" y="183" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#FF9900">⏳ to process</text>

    <!-- COMMIT label -->
    <rect x="475" y="215" width="150" height="30" rx="15" fill="#527FFF" opacity="0.9"/>
    <text x="550" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">COMMIT</text>
  </g>

  <!-- Background Worker -->
  <g filter="url(#shadow)">
    <rect x="435" y="345" width="270" height="80" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="435" y="345" width="270" height="26" rx="8" fill="url(#awsOrange)"/>
    <rect x="435" y="363" width="270" height="8" fill="url(#awsOrange)"/>
    <!-- Clock icon -->
    <circle cx="475" cy="358" r="9" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <line x1="475" y1="350" x2="475" y2="358" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <line x1="475" y1="358" x2="481" y2="363" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <text x="570" y="390" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#ffffff">Outbox Relay Worker</text>
    <text x="570" y="408" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">polls pending outbox records</text>
  </g>

  <!-- Arrow: TX Outbox → Worker -->
  <line x1="570" y1="312" x2="570" y2="343" stroke="#FF9900" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arrOrange)"/>
  <text x="620" y="332" font-family="Arial,sans-serif" font-size="10" fill="#FF9900">poll pending</text>

  <!-- Downstream: SQS -->
  <g filter="url(#shadow)">
    <rect x="760" y="290" width="130" height="90" rx="8" fill="#1e2f3d" stroke="#FF4F8B" stroke-width="2"/>
    <rect x="760" y="290" width="130" height="26" rx="8" fill="url(#awsPink)"/>
    <rect x="760" y="308" width="130" height="8" fill="url(#awsPink)"/>
    <rect x="775" y="295" width="22" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
    <rect x="775" y="303" width="22" height="5" rx="1" fill="#ffffff" opacity="0.7"/>
    <rect x="775" y="311" width="22" height="5" rx="1" fill="#ffffff" opacity="0.5"/>
    <text x="825" y="340" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">SQS Queue</text>
    <text x="825" y="358" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">async events</text>
    <text x="825" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">→ mark done</text>
  </g>

  <!-- Downstream: HTTP -->
  <g filter="url(#shadow)">
    <rect x="760" y="400" width="130" height="90" rx="8" fill="#1e2f3d" stroke="#FF9900" stroke-width="2"/>
    <rect x="760" y="400" width="130" height="26" rx="8" fill="url(#awsOrange)"/>
    <rect x="760" y="418" width="130" height="8" fill="url(#awsOrange)"/>
    <circle cx="800" cy="412" r="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <circle cx="800" cy="412" r="3" fill="#ffffff" opacity="0.8"/>
    <text x="825" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">HTTP Service</text>
    <text x="825" y="468" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">notification/etc</text>
    <text x="825" y="482" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#3F8624">→ mark done</text>
  </g>

  <!-- Worker → SQS -->
  <line x1="707" y1="370" x2="758" y2="335" stroke="#FF4F8B" stroke-width="2" marker-end="url(#arrPink)"/>
  <!-- Worker → HTTP -->
  <line x1="707" y1="395" x2="758" y2="440" stroke="#FF9900" stroke-width="2" marker-end="url(#arrOrange)"/>

  <!-- RDS note -->
  <g filter="url(#shadow)">
    <rect x="760" y="80" width="155" height="160" rx="8" fill="#1e2f3d" stroke="#527FFF" stroke-width="2"/>
    <rect x="760" y="80" width="155" height="26" rx="8" fill="url(#awsBlue)"/>
    <rect x="760" y="98" width="155" height="8" fill="url(#awsBlue)"/>
    <!-- DB icon -->
    <ellipse cx="800" cy="91" rx="12" ry="5" fill="#ffffff" opacity="0.8"/>
    <line x1="788" y1="91" x2="788" y2="101" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <line x1="812" y1="91" x2="812" y2="101" stroke="#ffffff" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="800" cy="101" rx="12" ry="5" fill="#2244aa" stroke="#ffffff" stroke-width="1" opacity="0.9"/>
    <text x="837" y="126" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#ffffff">Amazon RDS</text>
    <text x="837" y="142" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">(or any DB that</text>
    <text x="837" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">supports ACID</text>
    <text x="837" y="168" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">transactions)</text>
    <text x="837" y="190" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">PostgreSQL, MySQL,</text>
    <text x="837" y="205" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">MongoDB (multi-doc)</text>
    <text x="837" y="222" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#8ab4d4">DynamoDB (TX API)</text>
  </g>

  <!-- Arrow TX → RDS -->
  <line x1="732" y1="130" x2="758" y2="130" stroke="#527FFF" stroke-width="2" marker-end="url(#arrBlue)"/>

  <!-- Idempotency reminder -->
  <rect x="40" y="360" width="200" height="80" rx="8" fill="#0d2137" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="140" y="384" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#f39c12">⚠ Idempotency</text>
  <text x="140" y="402" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">Worker may retry same</text>
  <text x="140" y="418" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">outbox record. Handlers</text>
  <text x="140" y="432" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8ab4d4">must be idempotent.</text>
</svg>
