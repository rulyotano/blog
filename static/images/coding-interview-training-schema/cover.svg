<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="step" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="900" height="4" fill="url(#accent)"/>

  <!-- Title -->
  <text x="450" y="60" font-family="monospace, 'Courier New'" font-size="28" font-weight="bold" fill="#f1f5f9" text-anchor="middle">Coding Interview Training Schema</text>
  <text x="450" y="90" font-family="monospace, 'Courier New'" font-size="14" fill="#94a3b8" text-anchor="middle">A systematic approach to ace whiteboard interviews</text>

  <!-- Divider -->
  <line x1="60" y1="108" x2="840" y2="108" stroke="#334155" stroke-width="1"/>

  <!-- Step boxes -->
  <!-- Step 1: Understand -->
  <rect x="60" y="130" width="120" height="80" rx="8" fill="url(#step)" opacity="0.9"/>
  <text x="120" y="162" font-family="monospace" font-size="11" fill="#bfdbfe" text-anchor="middle" font-weight="bold">01</text>
  <text x="120" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Understand</text>
  <text x="120" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Problem</text>

  <!-- Arrow -->
  <line x1="180" y1="170" x2="205" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <polygon points="202,164 214,170 202,176" fill="#475569"/>

  <!-- Step 2: Edge Cases -->
  <rect x="215" y="130" width="120" height="80" rx="8" fill="#1e40af" opacity="0.9"/>
  <text x="275" y="162" font-family="monospace" font-size="11" fill="#bfdbfe" text-anchor="middle" font-weight="bold">02</text>
  <text x="275" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Find Edge</text>
  <text x="275" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Cases</text>

  <!-- Arrow -->
  <polygon points="337,164 349,170 337,176" fill="#475569"/>

  <!-- Step 3: Propose -->
  <rect x="350" y="130" width="120" height="80" rx="8" fill="#0e7490" opacity="0.9"/>
  <text x="410" y="162" font-family="monospace" font-size="11" fill="#a5f3fc" text-anchor="middle" font-weight="bold">03</text>
  <text x="410" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Propose</text>
  <text x="410" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Solutions</text>

  <!-- Arrow -->
  <polygon points="472,164 484,170 472,176" fill="#475569"/>

  <!-- Step 4: Implement -->
  <rect x="485" y="130" width="120" height="80" rx="8" fill="#166534" opacity="0.9"/>
  <text x="545" y="162" font-family="monospace" font-size="11" fill="#bbf7d0" text-anchor="middle" font-weight="bold">04</text>
  <text x="545" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Implement</text>
  <text x="545" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Solution</text>

  <!-- Arrow -->
  <polygon points="607,164 619,170 607,176" fill="#475569"/>

  <!-- Step 5: Test -->
  <rect x="620" y="130" width="120" height="80" rx="8" fill="#7e22ce" opacity="0.9"/>
  <text x="680" y="162" font-family="monospace" font-size="11" fill="#e9d5ff" text-anchor="middle" font-weight="bold">05</text>
  <text x="680" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Test &amp;</text>
  <text x="680" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Debug</text>

  <!-- Arrow -->
  <polygon points="742,164 754,170 742,176" fill="#475569"/>

  <!-- Step 6: Analyze -->
  <rect x="755" y="130" width="120" height="80" rx="8" fill="#9f1239" opacity="0.9"/>
  <text x="815" y="162" font-family="monospace" font-size="11" fill="#fecdd3" text-anchor="middle" font-weight="bold">06</text>
  <text x="815" y="180" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Analyze</text>
  <text x="815" y="196" font-family="monospace" font-size="10" fill="#ffffff" text-anchor="middle">Complexity</text>

  <!-- Divider -->
  <line x1="60" y1="232" x2="840" y2="232" stroke="#334155" stroke-width="1"/>

  <!-- Patterns section title -->
  <text x="60" y="260" font-family="monospace" font-size="13" fill="#64748b" font-weight="bold">15 KEY PATTERNS</text>

  <!-- Pattern chips row 1 -->
  <rect x="60" y="272" width="140" height="28" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="291" font-family="monospace" font-size="10" fill="#93c5fd" text-anchor="middle">Prefix Sum</text>

  <rect x="212" y="272" width="140" height="28" rx="4" fill="#1e293b" stroke="#3b82f6" stroke-width="1"/>
  <text x="282" y="291" font-family="monospace" font-size="10" fill="#93c5fd" text-anchor="middle">Two Pointers</text>

  <rect x="364" y="272" width="140" height="28" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="434" y="291" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">Sliding Window</text>

  <rect x="516" y="272" width="165" height="28" rx="4" fill="#1e293b" stroke="#06b6d4" stroke-width="1"/>
  <text x="598" y="291" font-family="monospace" font-size="10" fill="#67e8f9" text-anchor="middle">Fast &amp; Slow Pointers</text>

  <rect x="693" y="272" width="167" height="28" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="776" y="291" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">LinkedList Reversal</text>

  <!-- Pattern chips row 2 -->
  <rect x="60" y="312" width="140" height="28" rx="4" fill="#1e293b" stroke="#8b5cf6" stroke-width="1"/>
  <text x="130" y="331" font-family="monospace" font-size="10" fill="#c4b5fd" text-anchor="middle">Monotonic Stack</text>

  <rect x="212" y="312" width="140" height="28" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="282" y="331" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">Top K Elements</text>

  <rect x="364" y="312" width="140" height="28" rx="4" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="434" y="331" font-family="monospace" font-size="10" fill="#6ee7b7" text-anchor="middle">Merge Intervals</text>

  <rect x="516" y="312" width="165" height="28" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="598" y="331" font-family="monospace" font-size="10" fill="#fcd34d" text-anchor="middle">Modified Binary Search</text>

  <rect x="693" y="312" width="167" height="28" rx="4" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="776" y="331" font-family="monospace" font-size="10" fill="#fcd34d" text-anchor="middle">Binary Tree Traversal</text>

  <!-- Pattern chips row 3 -->
  <rect x="60" y="352" width="140" height="28" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="130" y="371" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">DFS</text>

  <rect x="212" y="352" width="140" height="28" rx="4" fill="#1e293b" stroke="#ef4444" stroke-width="1"/>
  <text x="282" y="371" font-family="monospace" font-size="10" fill="#fca5a5" text-anchor="middle">BFS</text>

  <rect x="364" y="352" width="140" height="28" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="434" y="371" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">Matrix Traversal</text>

  <rect x="516" y="352" width="165" height="28" rx="4" fill="#1e293b" stroke="#f97316" stroke-width="1"/>
  <text x="598" y="371" font-family="monospace" font-size="10" fill="#fdba74" text-anchor="middle">Backtracking</text>

  <rect x="693" y="352" width="167" height="28" rx="4" fill="#1e293b" stroke="#ec4899" stroke-width="1"/>
  <text x="776" y="371" font-family="monospace" font-size="10" fill="#f9a8d4" text-anchor="middle">Dynamic Programming</text>

  <!-- Bottom tip -->
  <line x1="60" y1="398" x2="840" y2="398" stroke="#334155" stroke-width="1"/>
  <text x="450" y="425" font-family="monospace" font-size="12" fill="#475569" text-anchor="middle">Communication + Process &gt; Just Solving the Problem</text>

  <!-- Bottom accent -->
  <rect x="0" y="496" width="900" height="4" fill="url(#accent)"/>
</svg>
