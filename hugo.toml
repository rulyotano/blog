baseURL = "http://localhost:1313/"
languageCode = "en-us"
title = "Raul's Blog"
theme = "github.com/adityatelange/hugo-PaperMod"

[module]

[[module.imports]]
path = "github.com/adityatelange/hugo-PaperMod"

# PaperMod recommends these
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
enableGitInfo = false   # flip to true once this is a git repo to show "last modified" dates
pygmentsUseClasses = true

[minify]
disableXML = true
minifyOutput = true

[pagination]
pagerSize = 10

[params]
env = "production"
title = "Raul's Blog"
description = "Notes on software engineering."
keywords = ["blog", "software", "engineering"]
author = "Raul"
mainSections = ["posts"]
defaultTheme = "auto"     # auto | light | dark
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowToc = true
TocOpen = false
disableSpecial1stPost = false
disableScrollToTop = false
comments = false

  [params.homeInfoParams]
  Title = "Hi 👋, I'm Raul"
  Content = "Welcome. I write about software engineering, systems, and whatever else I'm building."

  [[params.socialIcons]]
  name = "github"
  url = "https://github.com/rulyotano"

  [[params.socialIcons]]
  name = "web"
  url = "https://rulyotano.com"

  [[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/raulotanohurtado/"

  [params.assets]
  disableHLJS = true   # Hugo's built-in Chroma highlighter handles syntax highlighting

  [params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[markup]
  [markup.goldmark.renderer]
  unsafe = true   # allow raw HTML in markdown (handy for embeds; tighten if untrusted)

  [markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = "monokai"

[outputs]
home = ["HTML", "RSS", "JSON"]   # JSON output enables PaperMod's search page

[menu]
  [[menu.main]]
  identifier = "posts"
  name = "Articles"
  url = "/posts/"
  weight = 10

  [[menu.main]]
  identifier = "books"
  name = "Books"
  url = "/books/"
  weight = 20

